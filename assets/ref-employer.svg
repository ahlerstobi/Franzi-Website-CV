<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Employer Branding – Bildkonzept-Cover">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2e2416"/>
      <stop offset="50%"  stop-color="#3a2f20"/>
      <stop offset="100%" stop-color="#241c12"/>
    </linearGradient>
    <pattern id="dots2" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#c9a84c" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="640" height="360" fill="url(#bg2)"/>
  <rect width="640" height="360" fill="url(#dots2)"/>
  <rect x="0" y="0" width="640" height="3" fill="#c9a84c" opacity="0.55"/>

  <!-- Camera motif -->
  <g stroke="#c9a84c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="232" y="132" width="176" height="112" rx="14"/>
    <path d="M276 132 l10 -16 h28 l10 16"/>
    <circle cx="320" cy="190" r="38"/>
    <circle cx="320" cy="190" r="18"/>
  </g>
  <circle cx="384" cy="156" r="5" fill="#c9a84c"/>

  <!-- eyebrow -->
  <text x="320" y="284" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="15" font-weight="600" letter-spacing="5" fill="#c9a84c">BILDKONZEPT</text>
  <!-- title -->
  <text x="320" y="316" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="22" font-weight="600" letter-spacing="3" fill="#ffffff" opacity="0.92">EMPLOYER BRANDING</text>
</svg>
