<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Kaufland Kollektion – Kampagnen-Cover">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#241c12"/>
      <stop offset="55%"  stop-color="#3a2f20"/>
      <stop offset="100%" stop-color="#2e2416"/>
    </linearGradient>
    <pattern id="dots1" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#c9a84c" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="640" height="360" fill="url(#bg1)"/>
  <rect width="640" height="360" fill="url(#dots1)"/>
  <!-- top accent line -->
  <rect x="0" y="0" width="640" height="3" fill="#c9a84c" opacity="0.55"/>

  <!-- Clothes hanger motif -->
  <g stroke="#c9a84c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M320 138 q0 -24 -20 -24 q-18 0 -18 16"/>
    <path d="M320 138 L210 210 L430 210 Z"/>
  </g>

  <!-- eyebrow -->
  <text x="320" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="15" font-weight="600" letter-spacing="5" fill="#c9a84c">KAMPAGNENPRODUKTION</text>
  <!-- title -->
  <text x="320" y="304" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="22" font-weight="600" letter-spacing="3" fill="#ffffff" opacity="0.92">KAUFLAND KOLLEKTION</text>
</svg>
